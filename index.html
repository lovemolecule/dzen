<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="vk_allow_redirect" content="true">
    <title>Энциклопедия Дзена</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f0f0f0; }
        .book { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .chapter { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .chapter:hover { background: #f5f5f5; }
        button { background: #0077cc; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="book" id="app">
        <h1>📚 Энциклопедия Дзена</h1>
        <p>Загрузка...</p>
    </div>

    <script>
        // Полная база данных энциклопедии
        const chapters = [
            { id: 'intro', title: 'Вступление', text: 'Почему нужно прочесть! Здесь вы узнаете основы.' },
            { id: 'ch1', title: 'Глава 1. Словарь терминов', text: '30 терминов: алгоритм, вовлеченность, CTR, CPM и другие.' },
            { id: 'ch2', title: 'Глава 2. Алгоритм Дзена', text: 'Как работает нейросеть и принцип снежного кома.' },
            { id: 'ch3', title: 'Глава 3. Форматы контента', text: 'Статьи, посты, видео, нарративы.' },
            { id: 'conclusion', title: 'Заключение', text: 'Поздравляем! Вы прошли основы.' }
        ];

        function showMainMenu() {
            let html = '<h1>📚 Энциклопедия Дзена</h1><p>Полный гид по платформе</p>';
            chapters.forEach(ch => {
                html += `<div class="chapter" onclick="showChapter('${ch.id}')"><strong>${ch.title}</strong><br><span style="font-size:12px;color:#888;">Нажмите, чтобы прочитать</span></div>`;
            });
            html += `<footer style="margin-top:30px; text-align:center; font-size:12px; color:#888;">📖 VK Mini App • Энциклопедия создана для авторов Дзена</footer>`;
            document.getElementById('app').innerHTML = html;
        }

        window.showChapter = function(id) {
            const chapter = chapters.find(ch => ch.id === id);
            if (chapter) {
                document.getElementById('app').innerHTML = `
                    <button onclick="showMainMenu()">← К содержанию</button>
                    <h1>${chapter.title}</h1>
                    <p>${chapter.text}</p>
                    <button onclick="showMainMenu()">Вернуться к содержанию</button>
                `;
            }
        };

        // Инициализация VK Mini App
        function initVK() {
            if (window.location !== window.parent.location) {
                try {
                    if (typeof window.VKWebAppInit === 'function') {
                        window.VKWebAppInit();
                        console.log('VK Mini App initialized');
                    }
                } catch(e) { console.log('VK init error:', e); }
            }
        }

        window.onload = () => {
            showMainMenu();
            initVK();
        };
    </script>
    <script src="https://vk.com/js/api/xd_connection.js?2"></script>
</body>
</html>
